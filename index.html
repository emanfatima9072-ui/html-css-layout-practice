<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Learning Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
    <h1><b>Student Learning Portal</b></h1>
    <span class="badge"></span> 
</header>
<div class="layout">
    <aside class="sidebar">
        <h2>Registration Form</h2>
        <form>
            <input type="text" name="username" placeholder="Username" required>
            <br><br>
            <input type="password" name="password" placeholder="Password" required>
            <br><br>
            <button type="submit">Login</button>
        </form>
    </aside>

    <main>

        <section id="learning-topics">
            <h2>Learning Material Topics</h2>
            <ul>
                <li><b>HTML</b></li>
                <li><b>CSS</b></li>
                <li><b>JavaScript</b></li>
                <li><b>Python</b></li>
            </ul>
        </section>

        <section id="resources">
            <h2>Learning Resources</h2>
            <ol id="resources-list">

                <li>
                    <b>HTML</b><br>
                    <a href="https://youtu.be/HcOc7P5BMi4?si=87F6qSmr8RVBoIxL" target="_blank">HTML Crash Course</a>
                </li>

                <li>
                    <b>CSS</b><br>
                    <a href="https://www.youtube.com/watch?v=1Rs2ND1ryYc" target="_blank">CSS Crash Course</a>
                </li>

                <li>
                    <b>JavaScript</b><br>
                    <a href="https://www.youtube.com/watch?v=upDLs1sn7g4" target="_blank">JavaScript Tutorial</a>
                </li>

                <li>
                    <b>Python</b><br>
                    <a href="https://www.youtube.com/watch?v=_uQrJ0TkZlc" target="_blank">Python Tutorial</a>
                </li>

            </ol>
        </section>

        <section id="platforms">
            <h2>Coding Platforms</h2>

            <div class="coding-platforms">
                <a href="https://www.hackerrank.com/" target="_blank">
                    <img src="hackrank.png" alt="HackerRank Logo" width="200">
                </a>

                <a href="https://www.leetcode.com/" target="_blank">
                    <img src="LeetCode_logo_black.png" alt="LeetCode Logo" width="200">
                </a>

                <a href="https://www.codewars.com/" target="_blank">
                    <img src="brand-codewars.svg" alt="CodeWars Logo" width="200">
                </a>
            </div>

        </section>

    </main>

</div>

</body>
</html>
